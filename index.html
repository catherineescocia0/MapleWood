<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maplewood — A Cozy Town</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');

  :root {
    --cream: #f5e6c8;
    --brown: #6b4c2a;
    --green: #4a7c59;
    --dark-green: #2d5a3d;
    --sky: #87ceeb;
    --gold: #f0c060;
    --pink: #e8a0a0;
    --teal: #5ba8a0;
    --dialogue-bg: #1a1a2e;
    --dialogue-border: #f0c060;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; image-rendering: pixelated; }

  body {
    background: #0d0d1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
  }

  #game-wrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  #hud {
    width: 800px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 12px;
    background: #1a1a2e;
    border: 2px solid var(--gold);
    color: var(--gold);
    font-size: 7px;
    letter-spacing: 1px;
  }

  #hud .location { color: var(--cream); }
  #hud .hint { color: #888; font-size: 6px; animation: blink 2s infinite; }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  #canvas-container {
    position: relative;
    border: 3px solid var(--gold);
    box-shadow: 0 0 40px rgba(240,192,96,0.3), 0 0 80px rgba(240,192,96,0.1);
  }

  canvas { display: block; }

  /* Dialogue Box */
  #dialogue-overlay {
    display: none;
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 160px;
    background: linear-gradient(180deg, rgba(26,26,46,0.95) 0%, #1a1a2e 100%);
    border-top: 3px solid var(--gold);
    padding: 14px 18px 10px;
    z-index: 10;
  }

  #dialogue-overlay.active { display: flex; flex-direction: column; gap: 8px; }

  #dialogue-header {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #npc-portrait {
    width: 40px;
    height: 40px;
    border: 2px solid var(--gold);
    background: #0d0d1a;
    image-rendering: pixelated;
    flex-shrink: 0;
  }

  #npc-name {
    color: var(--gold);
    font-size: 8px;
    letter-spacing: 1px;
  }

  #npc-subtitle {
    color: #888;
    font-size: 6px;
    margin-top: 2px;
  }

  #dialogue-text {
    font-family: 'VT323', monospace;
    font-size: 20px;
    color: var(--cream);
    line-height: 1.5;
    flex: 1;
    min-height: 60px;
  }

  #dialogue-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #dialogue-page { color: #666; font-size: 6px; }

  #dialogue-continue {
    color: var(--gold);
    font-size: 7px;
    animation: blink 1s infinite;
    cursor: pointer;
  }

  /* Controls */
  #controls {
    width: 800px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 12px;
    background: #0d0d1a;
    color: #555;
    font-size: 6px;
  }

  .key {
    display: inline-block;
    background: #1a1a2e;
    border: 1px solid #444;
    padding: 2px 5px;
    color: #888;
    font-size: 5px;
    margin: 0 2px;
  }

  /* Loading screen */
  #loading {
    position: fixed; inset: 0;
    background: #0d0d1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 100;
  }

  #loading h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: 22px;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(240,192,96,0.5);
    animation: pulse 2s ease-in-out infinite;
  }

  #loading p {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: #888;
  }

  #loading-bar {
    width: 300px;
    height: 12px;
    border: 2px solid var(--gold);
    background: #0d0d1a;
    overflow: hidden;
  }

  #loading-fill {
    height: 100%;
    background: var(--gold);
    width: 0%;
    transition: width 0.1s;
  }

  @keyframes pulse { 0%,100%{text-shadow:0 0 20px rgba(240,192,96,0.5)} 50%{text-shadow:0 0 40px rgba(240,192,96,1)} }

  /* Notification */
  #notif {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(26,26,46,0.95);
    border: 2px solid var(--teal);
    color: var(--teal);
    padding: 6px 12px;
    font-size: 7px;
    opacity: 0;
    pointer-events: none;
    z-index: 20;
    transition: opacity 0.3s;
    white-space: nowrap;
  }
  #notif.show { opacity: 1; }
</style>
</head>
<body>

<div id="loading">
  <h1>🌿 Maplewood</h1>
  <p>a cozy little town</p>
  <div id="loading-bar"><div id="loading-fill"></div></div>
  <p id="loading-status">gathering acorns...</p>
</div>

<div id="game-wrapper">
  <div id="hud">
    <span class="location" id="location-name">🌿 Maplewood Town Square</span>
    <span class="hint" id="hud-hint">walk near a character to talk</span>
  </div>
  <div id="canvas-container">
    <canvas id="gameCanvas" width="800" height="480"></canvas>
    <div id="dialogue-overlay">
      <div id="dialogue-header">
        <canvas id="npc-portrait" width="40" height="40"></canvas>
        <div>
          <div id="npc-name">ROSIE</div>
          <div id="npc-subtitle">Town Baker</div>
        </div>
      </div>
      <div id="dialogue-text"></div>
      <div id="dialogue-footer">
        <span id="dialogue-page"></span>
        <span id="dialogue-continue">▼ SPACE / ENTER</span>
      </div>
    </div>
    <div id="notif"></div>
  </div>
  <div id="controls">
    <span><span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> or <span class="key">↑</span><span class="key">←</span><span class="key">↓</span><span class="key">→</span> — Move</span>
    <span><span class="key">SPACE</span> or <span class="key">ENTER</span> — Talk / Continue</span>
    <span><span class="key">ESC</span> — Close</span>
  </div>
</div>

<script>
// =====================
// GAME ENGINE
// =====================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const W = 800, H = 480;
const TILE = 32;

// =====================
// COLOR PALETTE
// =====================
const P = {
  skyTop:    '#b8e4f9',
  skyBot:    '#ddf0ff',
  grassDark: '#5a8f50',
  grassMid:  '#6aaa5e',
  grassLight:'#7cc46e',
  pathTan:   '#c8a878',
  pathEdge:  '#b8986a',
  treeTrunk: '#6b4c2a',
  treeLeaf1: '#3a7a4a',
  treeLeaf2: '#4a9a5a',
  treeLeaf3: '#5ab06a',
  roofRed:   '#c84040',
  roofDark:  '#a02828',
  wallCream: '#f0e0c0',
  wallShad:  '#d8c8a0',
  windowB:   '#88ccee',
  doorBrown: '#8b5c2a',
  gold:      '#f0c060',
  outline:   '#2a1a0a',
  water:     '#6ab0d8',
  waterShim: '#8ad0f0',
  flowerR:   '#e85050',
  flowerY:   '#f0d030',
  flowerP:   '#c060d0',
};

// =====================
// NPC DATA
// =====================
const NPCS = [
  {
    id: 'rosie',
    name: 'ROSIE',
    title: 'Town Baker',
    x: 260, y: 200,
    color: '#e8a0a0',
    accentColor: '#c06060',
    emoji: '🐰',
    animal: 'rabbit',
    lore: [
      "Ah, a visitor! Welcome to Maplewood! I'm Rosie — I've run this bakery since my grandmother passed her apron to me.",
      "This town was founded by seven animal families who came from the Great Oak Forest, oh... three hundred years ago, they say.",
      "Every morning I bake acorn bread. The secret? A pinch of clover honey from Mr. Finn's hives down by the river. Don't tell anyone!",
      "Legend says the old Maple tree in the center of town is magical. If you nap beneath it on the first day of autumn, you'll dream of your greatest wish.",
      "Maplewood has never had a bad harvest. Some say it's the tree. Others say it's the love the townsfolk put into the soil. I believe both.",
    ]
  },
  {
    id: 'finn',
    name: 'FINN',
    title: 'The Beekeeper',
    x: 590, y: 290,
    color: '#f0d080',
    accentColor: '#b89030',
    emoji: '🦊',
    animal: 'fox',
    lore: [
      "Oh! You startled me. I was just listening to my bees. They have a lot to say if you know how to hear them.",
      "My family has kept bees in Maplewood for five generations. These aren't ordinary bees — they only make honey from flowers that grow within the town's border.",
      "The old stories say Maplewood sits on a ley line — a vein of ancient magic in the earth. The flowers here glow faintly at midnight because of it.",
      "I once followed a bee for three miles into the Whispering Woods to the north. I found ruins there. Old stone circles. I didn't stay long.",
      "If you ever need to find your way in the dark, listen for bees. They always fly toward warmth and sweetness. Not bad life advice, either.",
    ]
  },
  {
    id: 'momo',
    name: 'MOMO',
    title: 'The Librarian',
    x: 160, y: 330,
    color: '#a0c0e8',
    accentColor: '#6090b8',
    emoji: '🦉',
    animal: 'owl',
    lore: [
      "Hm? Oh, don't mind the dust. The Library of Maplewood holds every story ever told in this town — even the ones people try to forget.",
      "The first book ever written here was by Elder Hazel, a hedgehog of great wisdom. It was simply titled: 'The Town That Chose Kindness.'",
      "According to my records, Maplewood once had a visitor from a city far to the east who claimed our town didn't exist on any map. She stayed forever after.",
      "There's a restricted section in the back — books on the Hollownight, a darkness that visited the town once, long ago. It was repelled by song. Literally.",
      "I've read every book here three times. My favorite? A tiny journal written by a mouse who spent one year counting every star she could see from Maplewood. 12,447.",
    ]
  },
  {
    id: 'pip',
    name: 'PIP',
    title: 'Young Adventurer',
    x: 440, y: 380,
    color: '#90d090',
    accentColor: '#50a050',
    emoji: '🐿️',
    animal: 'squirrel',
    lore: [
      "Hey hey hey! You're new here! I'm Pip! I'm gonna explore every inch of Maplewood AND the forest someday. Today I found a cool rock!",
      "Did you know there's a secret tunnel under the old café? Well, I think there is. The floor sounds hollow if you stomp just right. Rosie says I'm imagining things.",
      "My grandpa says there used to be a second town next to Maplewood called Ferndale. It disappeared one foggy morning and never came back. Nobody knows where it went.",
      "I've been mapping the whole town! Want to see? Wait, I lost the map. It's okay, it's all up here. *taps head* Well, mostly.",
      "The oldest resident is Old Barnaby the tortoise. He's 212 years old and lives by the eastern pond. He doesn't say much, but when he does, you should definitely listen.",
    ]
  },
];

// =====================
// PLAYER
// =====================
const player = {
  x: 380, y: 300,
  w: 20, h: 28,
  speed: 3,
  dir: 'down',
  frame: 0,
  frameTimer: 0,
  moving: false,
  color: '#7090e0',
  hairColor: '#3a2a1a',
};

// =====================
// INPUT
// =====================
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ' || e.key === 'Enter') handleInteract();
  if (e.key === 'Escape') closeDialogue();
  e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

// =====================
// DIALOGUE STATE
// =====================
let dialogue = {
  active: false,
  npc: null,
  page: 0,
};

function handleInteract() {
  if (dialogue.active) {
    nextDialoguePage();
    return;
  }
  // Find nearby NPC
  for (const npc of NPCS) {
    const dx = Math.abs(player.x - npc.x);
    const dy = Math.abs(player.y - npc.y);
    if (dx < 55 && dy < 55) {
      openDialogue(npc);
      return;
    }
  }
}

function openDialogue(npc) {
  dialogue.active = true;
  dialogue.npc = npc;
  dialogue.page = 0;
  renderDialogue();
  document.getElementById('dialogue-overlay').classList.add('active');
}

function nextDialoguePage() {
  if (!dialogue.active) return;
  dialogue.page++;
  if (dialogue.page >= dialogue.npc.lore.length) {
    closeDialogue();
    showNotif('~ • ~');
  } else {
    renderDialogue();
  }
}

function closeDialogue() {
  dialogue.active = false;
  document.getElementById('dialogue-overlay').classList.remove('active');
}

function renderDialogue() {
  const npc = dialogue.npc;
  document.getElementById('npc-name').textContent = npc.name;
  document.getElementById('npc-subtitle').textContent = npc.title;
  document.getElementById('dialogue-page').textContent = `${dialogue.page + 1} / ${npc.lore.length}`;

  // Typewriter effect
  const el = document.getElementById('dialogue-text');
  const text = npc.lore[dialogue.page];
  el.textContent = '';
  let i = 0;
  const interval = setInterval(() => {
    el.textContent += text[i];
    i++;
    if (i >= text.length) clearInterval(interval);
  }, 22);

  // Draw portrait
  drawPortrait(npc);
}

function drawPortrait(npc) {
  const pc = document.getElementById('npc-portrait');
  const pctx = pc.getContext('2d');
  pctx.imageSmoothingEnabled = false;
  pctx.clearRect(0, 0, 40, 40);
  drawAnimalPortrait(pctx, npc, 20, 20);
}

function showNotif(msg) {
  const n = document.getElementById('notif');
  n.textContent = msg;
  n.classList.add('show');
  setTimeout(() => n.classList.remove('show'), 1800);
}

// =====================
// CAMERA
// =====================
const WORLD_W = 800;
const WORLD_H = 640;
let cam = { x: 0, y: 0 };

// =====================
// DRAWING HELPERS
// =====================
function px(x) { return Math.floor(x); }

function drawRect(x, y, w, h, color, outline) {
  ctx.fillStyle = color;
  ctx.fillRect(px(x - cam.x), px(y - cam.y), w, h);
  if (outline) {
    ctx.strokeStyle = outline;
    ctx.lineWidth = 1;
    ctx.strokeRect(px(x - cam.x) + 0.5, px(y - cam.y) + 0.5, w - 1, h - 1);
  }
}

function drawCircle(x, y, r, color) {
  ctx.beginPath();
  ctx.arc(px(x - cam.x), px(y - cam.y), r, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
}

// =====================
// ENVIRONMENT
// =====================
function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, H * 0.55);
  grad.addColorStop(0, P.skyTop);
  grad.addColorStop(1, P.skyBot);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Clouds
  drawCloud(80 - cam.x * 0.3, 40, 60);
  drawCloud(300 - cam.x * 0.3, 25, 80);
  drawCloud(580 - cam.x * 0.3, 50, 50);
}

function drawCloud(x, y, w) {
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  const cx = px(x), cy = px(y);
  ctx.beginPath();
  ctx.ellipse(cx, cy + 10, w * 0.4, 10, 0, 0, Math.PI * 2);
  ctx.ellipse(cx + w * 0.2, cy + 5, w * 0.35, 12, 0, 0, Math.PI * 2);
  ctx.ellipse(cx - w * 0.15, cy + 8, w * 0.3, 10, 0, 0, Math.PI * 2);
  ctx.fill();
}

function drawGround() {
  // Main grass
  ctx.fillStyle = P.grassMid;
  ctx.fillRect(0, 0, W, H);

  // Path (cross shape)
  ctx.fillStyle = P.pathTan;
  ctx.fillRect(0, px(270 - cam.y), W, 48); // horizontal
  ctx.fillRect(px(370 - cam.x), 0, 48, H); // vertical

  // Path edges
  ctx.fillStyle = P.pathEdge;
  ctx.fillRect(0, px(270 - cam.y), W, 3);
  ctx.fillRect(0, px(315 - cam.y), W, 3);
  ctx.fillRect(px(370 - cam.x), 0, 3, H);
  ctx.fillRect(px(415 - cam.x), 0, 3, H);

  // Grass patches
  drawGrassPatch(120, 180);
  drawGrassPatch(600, 200);
  drawGrassPatch(200, 400);
  drawGrassPatch(650, 400);
  drawGrassPatch(500, 160);
}

function drawGrassPatch(x, y) {
  ctx.fillStyle = P.grassLight;
  for (let i = 0; i < 5; i++) {
    const ox = (i * 13) % 20 - 10;
    const oy = (i * 7) % 12 - 6;
    ctx.fillRect(px(x + ox - cam.x), px(y + oy - cam.y), 4, 6);
  }
}

// =====================
// BUILDINGS
// =====================
function drawBuildings() {
  // Bakery (left)
  drawBuilding(80, 110, 160, 130, P.wallCream, '#e07030', 'BAKERY', '#f0a060');

  // Library (top-left area)
  drawBuilding(40, 60, 120, 110, '#d8d0e8', '#5060a0', 'LIBRARY', '#8090c0');

  // Café (center-ish)
  drawBuilding(460, 80, 140, 120, '#e8e0d0', '#40806a', 'CAFÉ', '#60c0a0');

  // Beekeeper shop (right)
  drawBuilding(620, 130, 130, 110, '#f0e8c0', '#b07020', 'HONEY', '#f0c040');

  // Pond area
  drawPond(520, 340, 80, 50);

  // Big maple tree
  drawMapleTree(390, 230, 1.5);

  // Flower clusters
  drawFlowers(200, 260, 6);
  drawFlowers(550, 260, 5);
  drawFlowers(300, 400, 5);
  drawFlowers(130, 350, 4);
  drawFlowers(680, 350, 6);

  // Small trees
  drawTree(700, 140);
  drawTree(60, 360);
  drawTree(720, 360);
  drawTree(320, 120);
}

function drawBuilding(x, y, w, h, wallColor, roofColor, label, accent) {
  const rx = x - cam.x, ry = y - cam.y;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.fillRect(px(rx + 4), px(ry + 4), w, h);

  // Wall
  ctx.fillStyle = wallColor;
  ctx.fillRect(px(rx), px(ry + 20), w, h);

  // Shading
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.fillRect(px(rx), px(ry + 20), 8, h);
  ctx.fillRect(px(rx + w - 8), px(ry + 20), 8, h);

  // Roof (triangular using trapezoid)
  ctx.fillStyle = roofColor;
  ctx.beginPath();
  ctx.moveTo(px(rx - 6), px(ry + 22));
  ctx.lineTo(px(rx + w / 2), px(ry - 14));
  ctx.lineTo(px(rx + w + 6), px(ry + 22));
  ctx.closePath();
  ctx.fill();

  // Roof shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.moveTo(px(rx + w / 2), px(ry - 14));
  ctx.lineTo(px(rx + w + 6), px(ry + 22));
  ctx.lineTo(px(rx + w), px(ry + 22));
  ctx.closePath();
  ctx.fill();

  // Door
  ctx.fillStyle = P.doorBrown;
  ctx.fillRect(px(rx + w / 2 - 12), px(ry + h - 8), 24, 28);
  ctx.fillStyle = P.gold;
  ctx.fillRect(px(rx + w / 2 + 6), px(ry + h + 4), 4, 4);

  // Windows
  drawWindow(rx + 14, ry + h - 30);
  drawWindow(rx + w - 34, ry + h - 30);

  // Sign
  ctx.fillStyle = accent;
  ctx.fillRect(px(rx + w / 2 - 26), px(ry + 28), 52, 14);
  ctx.fillStyle = '#1a1a2e';
  ctx.font = '6px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.fillText(label, px(rx + w / 2), px(ry + 38));

  // Outline
  ctx.strokeStyle = P.outline;
  ctx.lineWidth = 1.5;
  ctx.strokeRect(px(rx), px(ry + 20), w, h);
}

function drawWindow(x, y) {
  ctx.fillStyle = P.windowB;
  ctx.fillRect(px(x), px(y), 20, 18);
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fillRect(px(x + 2), px(y + 2), 7, 14);
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fillRect(px(x + 11), px(y + 2), 7, 6);
  ctx.strokeStyle = P.outline;
  ctx.lineWidth = 1;
  ctx.strokeRect(px(x), px(y), 20, 18);
}

function drawPond(x, y, w, h) {
  const rx = x - cam.x, ry = y - cam.y;
  ctx.fillStyle = P.water;
  ctx.beginPath();
  ctx.ellipse(px(rx), px(ry), w, h, 0, 0, Math.PI * 2);
  ctx.fill();

  // shimmer
  ctx.fillStyle = P.waterShim;
  ctx.fillRect(px(rx - 20), px(ry - 8), 8, 3);
  ctx.fillRect(px(rx + 10), px(ry + 4), 12, 3);
  ctx.fillRect(px(rx - 5), px(ry + 10), 6, 3);

  ctx.strokeStyle = '#4090b8';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(px(rx), px(ry), w, h, 0, 0, Math.PI * 2);
  ctx.stroke();
}

function drawMapleTree(x, y, scale = 1) {
  const rx = x - cam.x, ry = y - cam.y;
  const s = scale;

  // Trunk
  ctx.fillStyle = P.treeTrunk;
  ctx.fillRect(px(rx - 8 * s), px(ry + 10 * s), 16 * s, 40 * s);

  // Leaves layered
  ctx.fillStyle = P.treeLeaf1;
  ctx.beginPath();
  ctx.arc(px(rx), px(ry - 10 * s), 38 * s, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = P.treeLeaf2;
  ctx.beginPath();
  ctx.arc(px(rx - 16 * s), px(ry - 4 * s), 24 * s, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = P.treeLeaf2;
  ctx.beginPath();
  ctx.arc(px(rx + 16 * s), px(ry - 4 * s), 24 * s, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = P.treeLeaf3;
  ctx.beginPath();
  ctx.arc(px(rx), px(ry - 22 * s), 24 * s, 0, Math.PI * 2);
  ctx.fill();

  // Gold glimmer on magic tree
  ctx.fillStyle = 'rgba(240,200,80,0.25)';
  ctx.beginPath();
  ctx.arc(px(rx + 10 * s), px(ry - 20 * s), 12 * s, 0, Math.PI * 2);
  ctx.fill();

  // Outline
  ctx.strokeStyle = P.outline;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(px(rx), px(ry - 10 * s), 38 * s, 0, Math.PI * 2);
  ctx.stroke();
}

function drawTree(x, y) {
  const rx = x - cam.x, ry = y - cam.y;
  ctx.fillStyle = P.treeTrunk;
  ctx.fillRect(px(rx - 5), px(ry + 10), 10, 25);
  ctx.fillStyle = P.treeLeaf1;
  ctx.beginPath();
  ctx.arc(px(rx), px(ry), 22, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = P.treeLeaf3;
  ctx.beginPath();
  ctx.arc(px(rx - 8), px(ry - 6), 14, 0, Math.PI * 2);
  ctx.fill();
}

function drawFlowers(x, y, count) {
  const colors = [P.flowerR, P.flowerY, P.flowerP, '#f080a0', '#80e080'];
  for (let i = 0; i < count; i++) {
    const ox = (i * 19 + i * i * 3) % 40 - 20;
    const oy = (i * 11) % 20 - 10;
    const rx = x + ox - cam.x;
    const ry = y + oy - cam.y;
    ctx.fillStyle = '#5a9a50';
    ctx.fillRect(px(rx), px(ry + 4), 2, 6);
    ctx.fillStyle = colors[i % colors.length];
    ctx.beginPath();
    ctx.arc(px(rx + 1), px(ry + 2), 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = P.gold;
    ctx.beginPath();
    ctx.arc(px(rx + 1), px(ry + 2), 2, 0, Math.PI * 2);
    ctx.fill();
  }
}

// =====================
// DRAW NPCS
// =====================
function drawNPCs(time) {
  for (const npc of NPCS) {
    drawNPC(npc, time);
  }
}

function drawNPC(npc, time) {
  const rx = npc.x - cam.x;
  const ry = npc.y - cam.y;

  // Proximity check
  const dx = Math.abs(player.x - npc.x);
  const dy = Math.abs(player.y - npc.y);
  const nearby = dx < 55 && dy < 55 && !dialogue.active;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(px(rx), px(ry + 14), 12, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body
  ctx.fillStyle = npc.color;
  ctx.fillRect(px(rx - 9), px(ry - 8), 18, 22);

  // Head
  drawAnimalHead(ctx, npc, rx, ry - 20, false);

  // Interaction bubble
  if (nearby) {
    const bubbleY = ry - 44 + Math.sin(time * 3) * 3;
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(px(rx - 14), px(bubbleY - 14), 28, 14);
    ctx.strokeStyle = P.gold;
    ctx.lineWidth = 1.5;
    ctx.strokeRect(px(rx - 14), px(bubbleY - 14), 28, 14);
    ctx.fillStyle = P.gold;
    ctx.font = '6px "Press Start 2P"';
    ctx.textAlign = 'center';
    ctx.fillText('TALK', px(rx), px(bubbleY - 4));
  }

  // Name tag
  ctx.fillStyle = 'rgba(26,26,46,0.8)';
  const nameW = npc.name.length * 5.5 + 6;
  ctx.fillRect(px(rx - nameW / 2), px(ry + 16), nameW, 10);
  ctx.fillStyle = '#ccc';
  ctx.font = '5px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.fillText(npc.name, px(rx), px(ry + 24));
}

function drawAnimalHead(targetCtx, npc, rx, ry, portrait) {
  const s = portrait ? 1 : 1;
  targetCtx.fillStyle = npc.color;
  targetCtx.beginPath();
  targetCtx.arc(px(rx), px(ry), 12 * s, 0, Math.PI * 2);
  targetCtx.fill();

  // Animal-specific features
  if (npc.animal === 'rabbit') {
    // Ears
    targetCtx.fillStyle = npc.color;
    targetCtx.fillRect(px(rx - 9), px(ry - 22), 6, 14);
    targetCtx.fillRect(px(rx + 3), px(ry - 22), 6, 14);
    targetCtx.fillStyle = '#f0c0c0';
    targetCtx.fillRect(px(rx - 8), px(ry - 21), 4, 12);
    targetCtx.fillRect(px(rx + 4), px(ry - 21), 4, 12);
  } else if (npc.animal === 'fox') {
    // Ears
    targetCtx.fillStyle = npc.color;
    targetCtx.beginPath();
    targetCtx.moveTo(px(rx - 10), px(ry - 8));
    targetCtx.lineTo(px(rx - 6), px(ry - 20));
    targetCtx.lineTo(px(rx - 2), px(ry - 10));
    targetCtx.fill();
    targetCtx.beginPath();
    targetCtx.moveTo(px(rx + 10), px(ry - 8));
    targetCtx.lineTo(px(rx + 6), px(ry - 20));
    targetCtx.lineTo(px(rx + 2), px(ry - 10));
    targetCtx.fill();
    // Snout
    targetCtx.fillStyle = '#f0c080';
    targetCtx.beginPath();
    targetCtx.ellipse(px(rx), px(ry + 4), 5, 4, 0, 0, Math.PI * 2);
    targetCtx.fill();
  } else if (npc.animal === 'owl') {
    // Head tuft
    targetCtx.fillStyle = npc.color;
    targetCtx.fillRect(px(rx - 5), px(ry - 14), 4, 6);
    targetCtx.fillRect(px(rx + 1), px(ry - 14), 4, 6);
    // Big eyes
    targetCtx.fillStyle = '#f0e0c0';
    targetCtx.beginPath();
    targetCtx.arc(px(rx - 5), px(ry), 5, 0, Math.PI * 2);
    targetCtx.arc(px(rx + 5), px(ry), 5, 0, Math.PI * 2);
    targetCtx.fill();
    targetCtx.fillStyle = '#2a2a4a';
    targetCtx.beginPath();
    targetCtx.arc(px(rx - 5), px(ry), 3, 0, Math.PI * 2);
    targetCtx.arc(px(rx + 5), px(ry), 3, 0, Math.PI * 2);
    targetCtx.fill();
  } else if (npc.animal === 'squirrel') {
    // Ears
    targetCtx.fillStyle = npc.color;
    targetCtx.beginPath();
    targetCtx.arc(px(rx - 8), px(ry - 10), 5, 0, Math.PI * 2);
    targetCtx.arc(px(rx + 8), px(ry - 10), 5, 0, Math.PI * 2);
    targetCtx.fill();
    // Fluffy tail hint
    targetCtx.fillStyle = npc.accentColor;
    targetCtx.beginPath();
    targetCtx.arc(px(rx + 14), px(ry + 10), 8, 0, Math.PI * 2);
    targetCtx.fill();
  }

  // Eyes (generic, overridden for owl)
  if (npc.animal !== 'owl') {
    targetCtx.fillStyle = '#1a1a2e';
    targetCtx.fillRect(px(rx - 5), px(ry - 2), 3, 3);
    targetCtx.fillRect(px(rx + 2), px(ry - 2), 3, 3);
    // Eye shine
    targetCtx.fillStyle = 'white';
    targetCtx.fillRect(px(rx - 4), px(ry - 3), 1, 1);
    targetCtx.fillRect(px(rx + 3), px(ry - 3), 1, 1);
  }
}

function drawAnimalPortrait(pctx, npc, cx, cy) {
  pctx.fillStyle = npc.color;
  pctx.beginPath();
  pctx.arc(cx, cy, 14, 0, Math.PI * 2);
  pctx.fill();
  drawAnimalHead(pctx, npc, cx, cy, true);
}

// =====================
// DRAW PLAYER
// =====================
function drawPlayer(time) {
  const rx = player.x - cam.x;
  const ry = player.y - cam.y;

  // Bob animation
  const bob = player.moving ? Math.sin(time * 12) * 2 : 0;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(px(rx), px(ry + 14), 10, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body
  ctx.fillStyle = player.color;
  ctx.fillRect(px(rx - 8), px(ry - 6 + bob), 16, 20);

  // Shading
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.fillRect(px(rx + 6), px(ry - 6 + bob), 2, 20);

  // Legs
  const legOff = player.moving ? Math.sin(time * 12) * 5 : 0;
  ctx.fillStyle = '#4060c0';
  ctx.fillRect(px(rx - 8), px(ry + 14 + bob), 7, 8 + legOff);
  ctx.fillRect(px(rx + 1), px(ry + 14 + bob), 7, 8 - legOff);

  // Head
  ctx.fillStyle = '#f0d0b0';
  ctx.beginPath();
  ctx.arc(px(rx), px(ry - 12 + bob), 10, 0, Math.PI * 2);
  ctx.fill();

  // Hair
  ctx.fillStyle = player.hairColor;
  ctx.fillRect(px(rx - 10), px(ry - 22 + bob), 20, 8);
  ctx.beginPath();
  ctx.arc(px(rx), px(ry - 14 + bob), 10, Math.PI, 0);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#1a1a2e';
  if (player.dir !== 'up') {
    ctx.fillRect(px(rx - 4), px(ry - 13 + bob), 3, 3);
    ctx.fillRect(px(rx + 1), px(ry - 13 + bob), 3, 3);
    ctx.fillStyle = 'white';
    ctx.fillRect(px(rx - 3), px(ry - 14 + bob), 1, 1);
    ctx.fillRect(px(rx + 2), px(ry - 14 + bob), 1, 1);
  }

  // Scarf
  ctx.fillStyle = '#e05050';
  ctx.fillRect(px(rx - 9), px(ry - 4 + bob), 18, 4);
}

// =====================
// UPDATE
// =====================
function update(dt) {
  if (dialogue.active) return;

  let dx = 0, dy = 0;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) dx -= 1;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) dx += 1;
  if (keys['ArrowUp'] || keys['w'] || keys['W']) dy -= 1;
  if (keys['ArrowDown'] || keys['s'] || keys['S']) dy += 1;

  if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }

  player.moving = dx !== 0 || dy !== 0;
  if (dx < 0) player.dir = 'left';
  else if (dx > 0) player.dir = 'right';
  else if (dy < 0) player.dir = 'up';
  else if (dy > 0) player.dir = 'down';

  // Collision with buildings (simple AABB)
  const nx = player.x + dx * player.speed;
  const ny = player.y + dy * player.speed;

  const buildings = [
    {x:80, y:130, w:160, h:130},
    {x:40, y:80, w:120, h:110},
    {x:460, y:100, w:140, h:120},
    {x:620, y:150, w:130, h:110},
  ];

  let collideX = false, collideY = false;
  for (const b of buildings) {
    // Check X
    if (nx > b.x - 12 && nx < b.x + b.w + 12 && player.y > b.y - 10 && player.y < b.y + b.h + 10) collideX = true;
    // Check Y
    if (player.x > b.x - 12 && player.x < b.x + b.w + 12 && ny > b.y - 10 && ny < b.y + b.h + 10) collideY = true;
  }

  if (!collideX) player.x = Math.max(12, Math.min(WORLD_W - 12, nx));
  if (!collideY) player.y = Math.max(12, Math.min(WORLD_H - 12, ny));

  // Camera
  cam.x = Math.max(0, Math.min(WORLD_W - W, player.x - W / 2));
  cam.y = Math.max(0, Math.min(WORLD_H - H, player.y - H / 2));

  // HUD location
  updateHUD();
}

function updateHUD() {
  let loc = '🌿 Maplewood';
  if (player.x < 300 && player.y < 250) loc = '🥐 Bakery Area';
  else if (player.x > 550 && player.y < 300) loc = '🍯 Beekeeper\'s Corner';
  else if (player.x < 200 && player.y > 300) loc = '📚 Library Row';
  else if (player.x > 480 && player.y > 300) loc = '🌊 The Pond';
  else if (Math.abs(player.x - 390) < 60 && Math.abs(player.y - 280) < 60) loc = '✨ The Magic Maple';
  document.getElementById('location-name').textContent = loc;
}

// =====================
// RENDER
// =====================
let lastTime = 0;
function render(timestamp) {
  const time = timestamp / 1000;
  const dt = time - lastTime;
  lastTime = time;

  update(dt);

  ctx.clearRect(0, 0, W, H);
  drawSky();
  drawGround();
  drawBuildings();
  drawNPCs(time);
  drawPlayer(time);

  // Vignette
  const vg = ctx.createRadialGradient(W/2, H/2, W*0.3, W/2, H/2, W*0.8);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.3)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);

  requestAnimationFrame(render);
}

// =====================
// LOADING SCREEN
// =====================
const loadingMessages = [
  'gathering acorns...',
  'brewing chamomile tea...',
  'watering the flowers...',
  'sweeping the café...',
  'waking the animals...',
  'polishing the lanterns...',
];

let loadPct = 0;
const fillEl = document.getElementById('loading-fill');
const statusEl = document.getElementById('loading-status');
let msgIdx = 0;

const loadInterval = setInterval(() => {
  loadPct += 8 + Math.random() * 10;
  fillEl.style.width = Math.min(100, loadPct) + '%';
  statusEl.textContent = loadingMessages[msgIdx % loadingMessages.length];
  msgIdx++;
  if (loadPct >= 100) {
    clearInterval(loadInterval);
    setTimeout(() => {
      document.getElementById('loading').style.opacity = 0;
      document.getElementById('loading').style.transition = 'opacity 0.5s';
      setTimeout(() => {
        document.getElementById('loading').style.display = 'none';
        requestAnimationFrame(render);
        showNotif('Welcome to Maplewood! 🌿');
      }, 500);
    }, 400);
  }
}, 120);
</script>
